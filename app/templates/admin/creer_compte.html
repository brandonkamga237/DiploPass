{% extends 'base.html' %}
{% block title %}Créer un compte{% endblock %}
{% block page_title %}Créer un compte{% endblock %}

{% block content %}

<div class="page-header">
  <h1><i class="bi bi-person-plus me-2"></i>Créer un compte utilisateur</h1>
  <p>
    <a href="{{ url_for('admin.dashboard') }}" class="text-decoration-none" style="color:#64748b">
      <i class="bi bi-arrow-left me-1"></i>Retour au tableau de bord
    </a>
  </p>
</div>

<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header">Informations du compte</div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('admin.creer_compte') }}">

          <div class="mb-4">
            <label class="form-label">Rôle</label>
            <select name="role" class="form-select" id="roleSelect" required onchange="toggleFiliere()">
              <option value="">Sélectionnez un rôle…</option>
              <option value="directeur">Directeur</option>
              <option value="chef_service">Chef Service Scolarité</option>
              <option value="chef_bureau">Chef Bureau Diplomation</option>
              <option value="representant">Représentant de Filière</option>
            </select>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label">Nom</label>
              <input type="text" name="nom" class="form-control" required placeholder="NOM">
            </div>
            <div class="col-md-6">
              <label class="form-label">Prénom</label>
              <input type="text" name="prenom" class="form-control" required placeholder="Prénom">
            </div>
          </div>

          <div class="mb-4" id="gradeDiv" style="display:none">
            <label class="form-label">Grade</label>
            <input type="text" name="grade" class="form-control" placeholder="Ex : Professeur">
          </div>

          <div id="filiereDiv" style="display:none">
            <div class="mb-4">
              <label class="form-label">Filière gérée</label>
              <input type="text" name="filiere_geree" class="form-control" placeholder="Ex : Génie Informatique">
            </div>
            <div class="mb-4">
              <label class="form-label">Bureau</label>
              <input type="text" name="bureau" class="form-control" placeholder="Ex : Bureau 12">
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Login</label>
            <input type="text" name="login" class="form-control" required placeholder="identifiant.connexion">
          </div>

          <div class="mb-5">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="mot_de_passe" class="form-control" required minlength="6">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-check me-2"></i>Créer le compte
            </button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Annuler</a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function toggleFiliere() {
  const role = document.getElementById('roleSelect').value;
  document.getElementById('filiereDiv').style.display = role === 'representant' ? 'block' : 'none';
  document.getElementById('gradeDiv').style.display = role === 'directeur' ? 'block' : 'none';
}
</script>
{% endblock %}
